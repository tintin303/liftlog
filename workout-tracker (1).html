<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="LiftLog">
<meta name="theme-color" content="#0a0a0a">
<title>LiftLog</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
:root {
  --bg:#0a0a0a;--bg2:#141414;--bg3:#1e1e1e;--bg4:#282828;
  --border:rgba(255,255,255,0.08);--text:#f0f0f0;--muted:#888;
  --push:#FF5E3A;--pull:#3A9EFF;--legs:#A06EFF;--pr:#FFD93D;
  --cardio:#00C896;--abs:#FF6B9D;--success:#4CAF50;
  --radius:14px;--font-display:'Bebas Neue',sans-serif;--font-body:'DM Sans',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--font-body);}
#app{display:flex;flex-direction:column;height:100%;max-width:480px;margin:0 auto;position:relative;overflow:hidden;}
.screen{display:none;flex-direction:column;height:100%;overflow:hidden;}
.screen.active{display:flex;}
.topbar{padding:52px 20px 16px;flex-shrink:0;}
.topbar-row{display:flex;align-items:center;justify-content:space-between;}
.topbar h1{font-family:var(--font-display);font-size:36px;letter-spacing:1px;}
.subtitle{font-size:13px;color:var(--muted);margin-top:2px;}
.scroll{flex:1;overflow-y:auto;padding:0 20px 100px;-webkit-overflow-scrolling:touch;}
.scroll::-webkit-scrollbar{display:none;}
.bottomnav{position:absolute;bottom:0;left:0;right:0;background:rgba(10,10,10,0.95);backdrop-filter:blur(20px);border-top:1px solid var(--border);display:flex;padding:8px 0 24px;z-index:100;}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;padding:8px 0;cursor:pointer;opacity:0.45;transition:opacity 0.2s;}
.nav-btn.active{opacity:1;}
.nav-btn svg{width:22px;height:22px;}
.nav-btn span{font-size:10px;font-weight:500;letter-spacing:0.5px;text-transform:uppercase;}

/* WEEK STRIP */
.week-strip{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:20px;}
.week-day{display:flex;flex-direction:column;align-items:center;gap:4px;}
.week-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;}
.week-dot{width:32px;height:32px;border-radius:50%;border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:600;color:var(--muted);}
.week-dot.push{background:rgba(255,94,58,0.2);border-color:var(--push);color:var(--push);}
.week-dot.pull{background:rgba(58,158,255,0.2);border-color:var(--pull);color:var(--pull);}
.week-dot.legs{background:rgba(160,110,255,0.2);border-color:var(--legs);color:var(--legs);}
.week-dot.today-ring{box-shadow:0 0 0 2px rgba(255,255,255,0.25);}

/* DAY CARDS */
.day-grid{display:grid;gap:12px;}
.day-card{background:var(--bg2);border-radius:var(--radius);border:1px solid var(--border);overflow:hidden;cursor:pointer;transition:transform 0.15s;}
.day-card:active{transform:scale(0.98);}
.day-card-header{padding:16px 18px;display:flex;align-items:center;justify-content:space-between;}
.day-badge{font-family:var(--font-display);font-size:22px;letter-spacing:1px;}
.day-badge.push{color:var(--push);}
.day-badge.pull{color:var(--pull);}
.day-badge.legs{color:var(--legs);}
.day-meta{font-size:12px;color:var(--muted);margin-top:2px;}
.day-muscles{display:flex;gap:6px;padding:0 18px 14px;flex-wrap:wrap;}
.muscle-tag{background:var(--bg3);border-radius:20px;padding:4px 10px;font-size:11px;color:var(--muted);font-weight:500;}

/* EXERCISES */
.exercise-list{display:flex;flex-direction:column;gap:10px;}
.exercise-card{background:var(--bg2);border-radius:var(--radius);border:1px solid var(--border);overflow:hidden;}
.exercise-header{padding:14px 16px;display:flex;align-items:center;gap:12px;cursor:pointer;}
.ex-icon{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.ex-info{flex:1;min-width:0;}
.ex-name{font-size:15px;font-weight:600;}
.ex-sub{font-size:12px;color:var(--muted);margin-top:2px;}
.pr-badge{background:rgba(255,217,61,0.15);color:var(--pr);font-size:10px;font-weight:600;padding:3px 7px;border-radius:20px;white-space:nowrap;}
.ex-expand{padding:0 16px 14px;display:none;}
.ex-expand.open{display:block;}
.set-header{display:grid;grid-template-columns:32px 1fr 1fr 40px;gap:8px;padding:6px 0;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;border-bottom:1px solid var(--border);margin-bottom:8px;}
.set-row{display:grid;grid-template-columns:32px 1fr 1fr 40px;gap:8px;align-items:center;margin-bottom:8px;}
.set-num{font-size:12px;color:var(--muted);text-align:center;}
.set-input{background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:var(--font-body);font-size:15px;font-weight:500;text-align:center;padding:8px 4px;width:100%;-webkit-appearance:none;}
.set-input:focus{outline:none;border-color:rgba(255,255,255,0.3);}
.set-input.completed{border-color:var(--success);background:rgba(76,175,80,0.1);}
.set-check{width:32px;height:32px;border-radius:8px;border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all 0.2s;}
.set-check.done{background:var(--success);border-color:var(--success);}
.btn-add-set{width:100%;background:var(--bg3);border:1px dashed var(--border);border-radius:8px;color:var(--muted);font-family:var(--font-body);font-size:13px;padding:10px;cursor:pointer;margin-top:4px;}

/* CARDIO & ABS */
.workout-section{background:var(--bg2);border-radius:var(--radius);border:1px solid var(--border);padding:16px;margin-bottom:12px;}
.ws-title{font-size:11px;text-transform:uppercase;letter-spacing:1px;font-weight:600;margin-bottom:12px;}
.ws-title.cardio{color:var(--cardio);}
.ws-title.abs{color:var(--abs);}
.option-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.opt-btn{background:var(--bg3);border:1.5px solid var(--border);border-radius:10px;padding:10px 8px;font-family:var(--font-body);font-size:13px;font-weight:500;color:var(--muted);cursor:pointer;text-align:center;transition:all 0.2s;}
.opt-btn.sel-cardio{background:rgba(0,200,150,0.12);border-color:var(--cardio);color:var(--cardio);}
.opt-btn.sel-abs{background:rgba(255,107,157,0.12);border-color:var(--abs);color:var(--abs);}
.dur-input{background:var(--bg3);border:1.5px solid var(--border);border-radius:10px;color:var(--text);font-family:var(--font-body);font-size:14px;padding:10px 12px;width:100%;margin-top:10px;-webkit-appearance:none;}
.dur-input:focus{outline:none;border-color:var(--cardio);}
.dur-row{display:flex;gap:8px;margin-top:10px;}
.dur-btn{flex:1;background:var(--bg3);border:1.5px solid var(--border);border-radius:10px;padding:10px;font-family:var(--font-body);font-size:13px;color:var(--muted);cursor:pointer;text-align:center;transition:all 0.2s;}
.dur-btn.sel{background:rgba(255,255,255,0.08);border-color:rgba(255,255,255,0.3);color:var(--text);}
.abs-note{font-size:11px;color:var(--muted);margin-top:8px;}

/* COMPLETE */
.complete-bar{background:rgba(76,175,80,0.12);border:1px solid rgba(76,175,80,0.3);border-radius:var(--radius);padding:14px 18px;display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.complete-bar span{font-size:14px;color:#4CAF50;font-weight:600;}
.btn-finish{background:var(--success);color:white;border:none;border-radius:10px;padding:12px 24px;font-family:var(--font-body);font-size:14px;font-weight:600;cursor:pointer;}

/* HISTORY */
.history-card{background:var(--bg2);border-radius:var(--radius);border:1px solid var(--border);padding:16px;margin-bottom:12px;}
.history-date{font-size:13px;color:var(--muted);margin-bottom:6px;}
.history-day{font-family:var(--font-display);font-size:22px;margin-bottom:10px;}
.history-day.push{color:var(--push);}
.history-day.pull{color:var(--pull);}
.history-day.legs{color:var(--legs);}
.history-ex-row{display:flex;justify-content:space-between;font-size:13px;margin-bottom:3px;}
.pill-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px;}
.pill{border-radius:20px;padding:3px 10px;font-size:11px;font-weight:500;}
.pill.cardio{background:rgba(0,200,150,0.12);color:var(--cardio);}
.pill.abs{background:rgba(255,107,157,0.12);color:var(--abs);}

/* CHARTS */
.chart-section{background:var(--bg2);border-radius:var(--radius);border:1px solid var(--border);padding:16px;margin-bottom:14px;}
.chart-title{font-size:13px;font-weight:600;margin-bottom:4px;}
.chart-sub{font-size:11px;color:var(--muted);margin-bottom:14px;}
.chart-wrap{position:relative;height:160px;}
.filter-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;}
.fcchip{background:var(--bg3);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;color:var(--muted);cursor:pointer;transition:all 0.2s;white-space:nowrap;}
.fcchip.active{background:rgba(255,255,255,0.1);border-color:rgba(255,255,255,0.3);color:var(--text);}

/* RECORDS */
.pr-card{background:var(--bg2);border-radius:var(--radius);border:1px solid var(--border);padding:16px;display:flex;align-items:center;gap:14px;margin-bottom:10px;}
.pr-icon{width:42px;height:42px;background:rgba(255,217,61,0.1);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.pr-name{font-size:14px;font-weight:600;}
.pr-sub{font-size:12px;color:var(--muted);margin-top:2px;}
.pr-weight{font-family:var(--font-display);font-size:26px;color:var(--pr);}
.pr-reps{font-size:11px;color:var(--muted);}

/* MISC */
.section-title{font-size:12px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);font-weight:600;margin:20px 0 10px;}
.back-btn{display:flex;align-items:center;gap:6px;color:var(--muted);font-size:14px;cursor:pointer;padding:4px 0;margin-bottom:8px;}
.chip-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;}
.chip{background:var(--bg3);border:1px solid var(--border);border-radius:20px;padding:6px 14px;font-size:13px;color:var(--muted);cursor:pointer;transition:all 0.2s;}
.chip.active{background:rgba(255,255,255,0.1);border-color:rgba(255,255,255,0.3);color:var(--text);}
#toast{position:fixed;top:60px;left:50%;transform:translateX(-50%) translateY(-20px);background:rgba(30,30,30,0.95);backdrop-filter:blur(10px);border:1px solid var(--border);border-radius:30px;padding:10px 20px;font-size:13px;font-weight:500;color:var(--text);z-index:999;opacity:0;transition:all 0.3s;pointer-events:none;white-space:nowrap;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.empty{text-align:center;padding:60px 20px;color:var(--muted);}
.empty .icon{font-size:40px;margin-bottom:12px;}
.empty p{font-size:14px;}
</style>
</head>
<body>
<div id="app">
<div id="toast"></div>

<!-- HOME -->
<div class="screen active" id="screen-home">
  <div class="topbar">
    <div class="topbar-row">
      <div><h1>LIFTLOG</h1><div class="subtitle" id="home-date"></div></div>
      <div style="text-align:right">
        <div style="font-family:var(--font-display);font-size:28px;color:var(--pr)" id="streak-num">0</div>
        <div style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px">Day Streak</div>
      </div>
    </div>
  </div>
  <div class="scroll">
    <div class="week-strip" id="week-strip"></div>
    <div class="section-title">Choose your workout</div>
    <div class="day-grid" id="day-grid"></div>
  </div>
</div>

<!-- WORKOUT -->
<div class="screen" id="screen-workout">
  <div class="topbar">
    <div class="back-btn" onclick="goHome()">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>Back
    </div>
    <div class="topbar-row">
      <div><h1 id="workout-title" style="font-size:30px"></h1><div class="subtitle" id="workout-subtitle"></div></div>
      <div id="workout-progress" style="font-family:var(--font-display);font-size:28px;color:var(--muted)"></div>
    </div>
  </div>
  <div class="scroll">
    <div id="complete-bar-wrap"></div>
    <!-- CARDIO -->
    <div class="workout-section">
      <div class="ws-title cardio">Cardio · Warmup</div>
      <div id="cardio-opts" style="display:flex;flex-direction:column;gap:10px;"></div>
      <div class="abs-note" style="margin-top:8px">Tap to select · Pick 15 or 30 min</div>
    </div>
    <!-- EXERCISES -->
    <div class="section-title">Exercises</div>
    <div id="exercise-list" class="exercise-list"></div>
    <!-- ABS -->
    <div class="workout-section" style="margin-top:14px">
      <div class="ws-title abs">Abs · Finisher</div>
      <div id="abs-opts" style="display:flex;flex-direction:column;gap:10px;"></div>
      <div class="abs-note" style="margin-top:8px">Tap to select · Pick 30s or 60s intervals</div>
    </div>
  </div>
</div>

<!-- PROGRESS -->
<div class="screen" id="screen-progress">
  <div class="topbar"><h1>PROGRESS</h1><div class="subtitle" style="margin-top:4px">Weight over time per exercise</div></div>
  <div class="scroll">
    <div class="filter-row" id="prog-filter"></div>
    <div id="prog-content"></div>
  </div>
</div>

<!-- HISTORY -->
<div class="screen" id="screen-history">
  <div class="topbar"><h1>HISTORY</h1><div class="subtitle" style="margin-top:4px">Past sessions</div></div>
  <div class="scroll"><div id="history-content"></div></div>
</div>

<!-- RECORDS -->
<div class="screen" id="screen-prs">
  <div class="topbar"><h1>RECORDS</h1><div class="subtitle" style="margin-top:4px">Personal bests</div></div>
  <div class="scroll">
    <div class="chip-row" id="pr-filter-row"></div>
    <div id="pr-content"></div>
  </div>
</div>

<!-- NAV -->
<nav class="bottomnav">
  <div class="nav-btn active" id="nav-home" onclick="switchTab('home')">
    <svg fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    <span>Home</span>
  </div>
  <div class="nav-btn" id="nav-progress" onclick="switchTab('progress')">
    <svg fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>
    <span>Progress</span>
  </div>
  <div class="nav-btn" id="nav-history" onclick="switchTab('history')">
    <svg fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
    <span>History</span>
  </div>
  <div class="nav-btn" id="nav-prs" onclick="switchTab('prs')">
    <svg fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><circle cx="12" cy="8" r="6"/><path d="M8.56 14.9L6 22l6-3 6 3-2.56-7.1"/></svg>
    <span>Records</span>
  </div>
</nav>
</div>

<script>
const CARDIO_OPTS = ['Bike','Erg / Row','Elliptical'];
const ABS_OPTS = [
  {id:'leg_lifts',name:'Leg Lifts',timed:true},
  {id:'russian_twists',name:'Russian Twists',timed:true},
  {id:'plank',name:'Plank',timed:true},
  {id:'steam_engines',name:'Steam Engines',timed:true},
  {id:'rev_crunches',name:'Reverse Crunches',timed:true},
  {id:'crunches',name:'Crunches',timed:true},
];

const WORKOUTS = {
  push:{
    label:'PUSH',type:'push',color:'#FF5E3A',
    muscles:['Chest','Front Delts','Triceps'],
    subtitle:'Chest · Shoulders · Triceps',
    exercises:[
      {id:'bp',   name:'Barbell Bench Press',      icon:'🏋️',sub:'Barbell · Chest compound',        defaultSets:3,defaultReps:6, defaultWeight:135,tip:'Lying — no toe load. Control descent, 1s pause at chest.'},
      {id:'ip',   name:'Incline DB Press',          icon:'💪',sub:'Dumbbells · Upper chest',          defaultSets:3,defaultReps:6, defaultWeight:55, tip:'30-45° bench, feet flat. Full stretch at bottom.'},
      {id:'cfly', name:'Cable Fly (seated)',         icon:'🔗',sub:'Cable · Chest isolation',          defaultSets:3,defaultReps:12,defaultWeight:20, tip:'Sit on bench between cables. Squeeze at center.'},
      {id:'sohp', name:'Seated DB Shoulder Press',  icon:'💪',sub:'Dumbbells · Shoulder compound',    defaultSets:3,defaultReps:6, defaultWeight:50, tip:'Back support, seated. Press straight up, don\'t arch.'},
      {id:'lrl',  name:'Lateral Raises (seated)',   icon:'💪',sub:'Dumbbells · Side delts',           defaultSets:3,defaultReps:12,defaultWeight:20, tip:'Sit at bench end. Lead with elbows to shoulder height.'},
      {id:'fpd',  name:'Face Pulls',                icon:'🔗',sub:'Cable · Rear delt',                defaultSets:3,defaultReps:12,defaultWeight:30, tip:'Kneel or sit. Pull to forehead, externally rotate at end.'},
      {id:'tpd',  name:'Tricep Pushdown',           icon:'🔗',sub:'Cable · Triceps isolation',        defaultSets:3,defaultReps:12,defaultWeight:50, tip:'Lock elbows at sides, full extension at bottom.'},
      {id:'ohext',name:'Overhead Tricep Extension', icon:'🔗',sub:'Cable · Long head tricep',         defaultSets:3,defaultReps:12,defaultWeight:35, tip:'Seated facing away from cable. Full overhead stretch.'},
    ]
  },
  pull:{
    label:'PULL',type:'pull',color:'#3A9EFF',
    muscles:['Back','Biceps','Rear Delts'],
    subtitle:'Back · Biceps · Rear Delts',
    exercises:[
      {id:'lpd',   name:'Lat Pulldown',              icon:'🔗',sub:'Cable · Lats compound',           defaultSets:3,defaultReps:6, defaultWeight:120,tip:'Thighs locked under pad. Pull to upper chest.'},
      {id:'cseat', name:'Cable Seated Row',           icon:'🔗',sub:'Cable · Mid back',                defaultSets:3,defaultReps:6, defaultWeight:100,tip:'Chest to pad. Row elbows behind torso, squeeze blades.'},
      {id:'dbrow', name:'Supported DB Row',           icon:'💪',sub:'Dumbbells · Lats',                defaultSets:3,defaultReps:6, defaultWeight:70, tip:'Chest on incline bench — zero toe load. Full range.'},
      {id:'cstr',  name:'Cable Straight-Arm Pulldown',icon:'🔗',sub:'Cable · Lat isolation',           defaultSets:3,defaultReps:12,defaultWeight:40, tip:'Arms straight, pull bar to thighs. Feel lats stretch.'},
      {id:'cbcurl',name:'Cable Bicep Curl',           icon:'🔗',sub:'Cable · Biceps',                  defaultSets:3,defaultReps:12,defaultWeight:40, tip:'Sit on bench in front of low cable. Keep elbows fixed.'},
      {id:'hcurl', name:'Seated Hammer Curl',         icon:'💪',sub:'Dumbbells · Brachialis',          defaultSets:3,defaultReps:12,defaultWeight:35, tip:'Neutral grip, slow 3s eccentric for extra growth.'},
      {id:'prfly', name:'Rear Delt Cable Fly',        icon:'🔗',sub:'Cable · Rear delts',              defaultSets:3,defaultReps:12,defaultWeight:15, tip:'Seated, cables crossed low. Pull back with elbows wide.'},
    ]
  },
  legs:{
    label:'LEGS',type:'legs',color:'#A06EFF',
    muscles:['Quads','Hamstrings','Glutes'],
    subtitle:'Seated machines only · Toe-safe',
    exercises:[
      {id:'lp',        name:'Leg Press',             icon:'🦵',sub:'Machine · Quads & Glutes',        defaultSets:3,defaultReps:6, defaultWeight:180,tip:'Heel-driven push. Keep heels flat — don\'t let them lift.'},
      {id:'lc',        name:'Seated Leg Curl',        icon:'🦵',sub:'Machine · Hamstrings',            defaultSets:3,defaultReps:6, defaultWeight:90, tip:'Full ROM, 2s squeeze at bottom. No toe involvement.'},
      {id:'le',        name:'Leg Extension',          icon:'🦵',sub:'Machine · Quad isolation',        defaultSets:3,defaultReps:12,defaultWeight:80, tip:'Pause 1s at top. Flex quads through entire rep.'},
      {id:'hipab',     name:'Hip Abduction Machine',  icon:'🦵',sub:'Machine · Glutes/TFL',            defaultSets:3,defaultReps:12,defaultWeight:70, tip:'Fully seated, no foot load. Great for glute med.'},
      {id:'hipad',     name:'Hip Adduction Machine',  icon:'🦵',sub:'Machine · Inner thigh',           defaultSets:3,defaultReps:12,defaultWeight:70, tip:'Squeeze inward slowly, resist on the way out.'},
      {id:'seatedcalf',name:'Seated Calf Raise',      icon:'🦵',sub:'Machine · Soleus',                defaultSets:3,defaultReps:12,defaultWeight:90, tip:'Full stretch at bottom, 1s hold at top. Seated ONLY.'},
    ]
  }
};

let state = {
  currentWorkout:null, sets:{}, cardio:{type:null,duration:null},
  absSelected:[], absIntervals:{}, absSets:{},
  prs:{}, history:[], streak:0, lastWorkoutDate:null,
};

function loadState(){ try{ const s=localStorage.getItem('liftlog3'); if(s) state={...state,...JSON.parse(s)}; }catch(e){} }
function saveState(){ try{ localStorage.setItem('liftlog3',JSON.stringify(state)); }catch(e){} }
function toastMsg(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2200); }
function todayKey(){ return new Date().toISOString().split('T')[0]; }
function fmtDate(iso){ return new Date(iso).toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'}); }

<path d="M42 52C30 60 22 80 24 110L36 110L38 80L42 75Z" fill="#1e1e1e" stroke="#333" stroke-width="1.5"/>

<path d="M38 75L38 130L44 130L48 110L52 130L68 130L72 110L76 130L82 130L82 75Z" fill="#1e1e1e" stroke="#333" stroke-width="1.5"/>
<path d="M42 130L36 155L46 155L52 130Z" fill="#1e1e1e" stroke="#333" stroke-width="1.5"/>
<path d="M78 130L74 130L68 155L78 155L84 130Z" fill="#1e1e1e" stroke="#333" stroke-width="1.5"/>`;

<ellipse cx="71" cy="70" rx="10" ry="8" fill="${c}" opacity="0.85"/>

<ellipse cx="85" cy="57" rx="9" ry="7" fill="${c}" opacity="0.7" transform="rotate(20,85,57)"/>
<path d="M26 65C22 75 22 90 26 100L34 95C30 82 30 68 34 62Z" fill="${c}" opacity="0.65"/>
<path d="M94 65C98 75 98 90 94 100L86 95C90 82 90 68 86 62Z" fill="${c}" opacity="0.65"/>`,

// WEEK STRIP
function renderWeekStrip(){
  const strip=document.getElementById('week-strip');
  const days=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const now=new Date(); const todayIdx=now.getDay();
  const weekMap={};
  state.history.forEach(h=>{
    const d=new Date(h.date);
    const diff=Math.floor((now-d)/86400000);
    if(diff>=0&&diff<7) weekMap[d.getDay()]=h.type;
  });
  strip.innerHTML=days.map((d,i)=>{
    const type=weekMap[i]||'';
    const label=type?type[0].toUpperCase():'';
    const isToday=i===todayIdx;
    return `<div class="week-day">
      <div class="week-label">${d}</div>
      <div class="week-dot ${type} ${isToday?'today-ring':''}">${label}</div>
    </div>`;
  }).join('');
}

// HOME
function renderHome(){
  document.getElementById('home-date').textContent=new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});
  document.getElementById('streak-num').textContent=state.streak;
  renderWeekStrip();
  const grid=document.getElementById('day-grid'); grid.innerHTML='';
  Object.entries(WORKOUTS).forEach(([key,w])=>{
    const last=state.history.filter(h=>h.type===key).slice(-1)[0];
    let lastStr='';
    if(last){ const diff=Math.floor((Date.now()-new Date(last.date))/86400000); lastStr=' · Last: '+(diff===0?'Today':diff===1?'Yesterday':diff+'d ago'); }
    const card=document.createElement('div'); card.className='day-card';
    card.innerHTML=`<div class="day-card-header">
      <div><div class="day-badge ${key}">${w.label}</div><div class="day-meta">${w.subtitle}${lastStr}</div></div>
      <div style="display:flex;align-items:center;gap:10px"><div style="width:72px;height:96px;flex-shrink:0">${muscleSVG(key)}</div><div style="color:var(--muted);font-size:20px">›</div></div>
    </div>
    <div class="day-muscles">${w.muscles.map(m=>`<span class="muscle-tag">${m}</span>`).join('')}<span class="muscle-tag">${w.exercises.length} exercises</span></div>`;
    card.onclick=()=>startWorkout(key); grid.appendChild(card);
  });
}

// WORKOUT
function startWorkout(type){
  state.currentWorkout=type; state.sets={}; state.cardio={type:null,duration:null}; state.absSelected=[]; state.absIntervals={}; state.absSets={};
  WORKOUTS[type].exercises.forEach(ex=>{
    state.sets[ex.id]=[];
    for(let i=0;i<ex.defaultSets;i++) state.sets[ex.id].push({weight:ex.defaultWeight,reps:ex.defaultReps,done:false});
  });
  renderWorkout(); switchScreen('workout');
}

function renderWorkout(){
  const type=state.currentWorkout; const w=WORKOUTS[type];
  document.getElementById('workout-title').textContent=w.label+' DAY';
  document.getElementById('workout-title').style.color=w.color;
  document.getElementById('workout-subtitle').textContent=w.subtitle;
  renderCardioOpts(); renderAbsOpts();
  const list=document.getElementById('exercise-list'); list.innerHTML='';
  w.exercises.forEach(ex=>buildExCard(ex,list));
  updateProgress();
}

function renderCardioOpts(){
  const co=document.getElementById('cardio-opts');
  co.innerHTML='';
  CARDIO_OPTS.forEach(o=>{
    const sel=state.cardio.type===o;
    const dur=state.cardio.duration||null;
    const row=document.createElement('div');
    row.style.cssText='display:flex;flex-direction:column;gap:6px;';
    row.innerHTML=`<div class="opt-btn ${sel?'sel-cardio':''}" onclick="pickCardio('${o}')">${o}</div>
      <div style="display:${sel?'flex':'none'};gap:6px;">
        <div class="dur-btn ${dur===15?'sel':''}" style="flex:1;font-size:12px;padding:7px 4px;" onclick="pickCardioDur(15)">15 min</div>
        <div class="dur-btn ${dur===30?'sel':''}" style="flex:1;font-size:12px;padding:7px 4px;" onclick="pickCardioDur(30)">30 min</div>
      </div>`;
    co.appendChild(row);
  });
}

function pickCardio(o){
  state.cardio.type=state.cardio.type===o?null:o;
  if(!state.cardio.type) state.cardio.duration=null;
  renderCardioOpts();
}

function pickCardioDur(mins){
  state.cardio.duration=state.cardio.duration===mins?null:mins;
  renderCardioOpts();
}

function renderAbsOpts(){
  const ao=document.getElementById('abs-opts');
  ao.innerHTML='';
  ABS_OPTS.forEach(a=>{
    const sel=state.absSelected.includes(a.id);
    const intv=state.absIntervals[a.id]||null;
    const sets=state.absSets[a.id]||1;
    const row=document.createElement('div');
    row.style.cssText='display:flex;flex-direction:column;gap:6px;';
    row.innerHTML=`<div class="opt-btn ${sel?'sel-abs':''}" onclick="toggleAbs('${a.id}')">${a.name}</div>
      <div style="display:${sel?'flex':'none'};gap:6px;align-items:center;">
        <div class="dur-btn ${intv===30?'sel':''}" style="flex:1;font-size:12px;padding:7px 4px;" onclick="pickAbsInterval('${a.id}',30)">30s</div>
        <div class="dur-btn ${intv===60?'sel':''}" style="flex:1;font-size:12px;padding:7px 4px;" onclick="pickAbsInterval('${a.id}',60)">60s</div>
        <div style="display:flex;align-items:center;gap:0;background:var(--bg3);border:1.5px solid var(--border);border-radius:10px;overflow:hidden;flex-shrink:0;">
          <div onclick="adjAbsSets('${a.id}',-1)" style="padding:7px 12px;cursor:pointer;color:var(--muted);font-size:16px;line-height:1;">−</div>
          <div style="padding:7px 8px;font-size:13px;font-weight:600;min-width:28px;text-align:center;">${sets}</div>
          <div onclick="adjAbsSets('${a.id}',1)" style="padding:7px 12px;cursor:pointer;color:var(--muted);font-size:16px;line-height:1;">+</div>
        </div>
        <div style="font-size:11px;color:var(--muted);">sets</div>
      </div>`;
    ao.appendChild(row);
  });
}

function toggleAbs(id){
  const i=state.absSelected.indexOf(id);
  if(i===-1){ state.absSelected.push(id); state.absSets[id]=state.absSets[id]||1; }
  else { state.absSelected.splice(i,1); delete state.absIntervals[id]; delete state.absSets[id]; }
  renderAbsOpts();
}

function pickAbsInterval(id,secs){
  state.absIntervals[id]=state.absIntervals[id]===secs?null:secs;
  renderAbsOpts();
}

function adjAbsSets(id,delta){
  const cur=state.absSets[id]||1;
  state.absSets[id]=Math.max(1,Math.min(10,cur+delta));
  renderAbsOpts();
}

function updateAbsInterval(){}

function buildExCard(ex,container){
  const type=state.currentWorkout; const sets=state.sets[ex.id]||[];
  const pr=state.prs[ex.id]; const prText=pr?`PR: ${pr.weight}lb×${pr.reps}`:'No PR';
  const iconBg=type==='push'?'rgba(255,94,58,0.12)':type==='pull'?'rgba(58,158,255,0.12)':'rgba(160,110,255,0.12)';
  let setsHTML=`<div class="set-header"><div style="text-align:center">Set</div><div style="text-align:center">Weight (lb)</div><div style="text-align:center">Reps</div><div></div></div>`;
  sets.forEach((s,i)=>{
    setsHTML+=`<div class="set-row" id="sr-${ex.id}-${i}">
      <div class="set-num">${i+1}</div>
      <input class="set-input ${s.done?'completed':''}" type="number" inputmode="decimal" value="${s.weight}" onchange="updSet('${ex.id}',${i},'weight',this.value)" onfocus="this.select()">
      <input class="set-input ${s.done?'completed':''}" type="number" inputmode="decimal" value="${s.reps}" onchange="updSet('${ex.id}',${i},'reps',this.value)" onfocus="this.select()">
      <div class="set-check ${s.done?'done':''}" onclick="toggleSet('${ex.id}',${i})">
        <svg width="14" height="14" fill="none" stroke="${s.done?'white':'#555'}" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
      </div></div>`;
  });
  const card=document.createElement('div'); card.className='exercise-card'; card.id='exc-'+ex.id;
  card.innerHTML=`<div class="exercise-header" onclick="toggleEx('${ex.id}')">
    <div class="ex-icon" style="background:${iconBg}">${ex.icon}</div>
    <div class="ex-info"><div class="ex-name">${ex.name}</div><div class="ex-sub">${ex.sub}</div></div>
    <span class="pr-badge">${prText}</span>
  </div>
  <div class="ex-expand" id="exp-${ex.id}">
    <div style="font-size:12px;color:var(--muted);margin-bottom:12px;padding:8px 10px;background:var(--bg3);border-radius:8px">💡 ${ex.tip}</div>
    ${setsHTML}
    <button class="btn-add-set" onclick="addSet('${ex.id}')">+ Add set</button>
  </div>`;
  container.appendChild(card);
}

function toggleEx(id){ document.getElementById('exp-'+id).classList.toggle('open'); }
function updSet(exId,idx,field,val){ state.sets[exId][idx][field]=parseFloat(val)||0; saveState(); }

function toggleSet(exId,idx){
  const s=state.sets[exId][idx]; s.done=!s.done;
  const row=document.getElementById(`sr-${exId}-${idx}`);
  row.querySelectorAll('.set-input').forEach(i=>i.classList.toggle('completed',s.done));
  const chk=row.querySelector('.set-check'); chk.classList.toggle('done',s.done);
  chk.querySelector('svg').setAttribute('stroke',s.done?'white':'#555');
  if(s.done) checkPR(exId,s);
  saveState(); updateProgress(); updPRBadge(exId);
}

function checkPR(exId,set){
  const ex=allEx().find(e=>e.id===exId); if(!ex) return;
  const pr=state.prs[exId];
  if(!pr||set.weight>pr.weight||(set.weight===pr.weight&&set.reps>pr.reps)){
    state.prs[exId]={weight:set.weight,reps:set.reps,date:todayKey(),name:ex.name};
    saveState(); if(pr) toastMsg(`🏆 New PR on ${ex.name}! ${set.weight}lb × ${set.reps}`);
  }
}

function updPRBadge(exId){
  const pr=state.prs[exId]; const badge=document.querySelector(`#exc-${exId} .pr-badge`);
  if(badge&&pr) badge.textContent=`PR: ${pr.weight}lb×${pr.reps}`;
}

function addSet(exId){
  const ex=allEx().find(e=>e.id===exId);
  const last=state.sets[exId].slice(-1)[0]||{weight:ex.defaultWeight,reps:ex.defaultReps};
  state.sets[exId].push({weight:last.weight,reps:last.reps,done:false}); saveState();
  const container=document.getElementById('exercise-list');
  const old=document.getElementById('exc-'+exId);
  const wasOpen=document.getElementById('exp-'+exId).classList.contains('open');
  const exList=WORKOUTS[state.currentWorkout].exercises;
  const idx=exList.findIndex(e=>e.id===exId); old.remove();
  const tmp=document.createElement('div'); buildExCard(ex,tmp);
  const cards=container.querySelectorAll('.exercise-card');
  if(idx<cards.length) container.insertBefore(tmp.firstChild,cards[idx]); else container.appendChild(tmp.firstChild);
  if(wasOpen) document.getElementById('exp-'+exId).classList.add('open');
}

function updateProgress(){
  const w=WORKOUTS[state.currentWorkout]; let total=0,done=0;
  w.exercises.forEach(ex=>(state.sets[ex.id]||[]).forEach(s=>{total++;if(s.done)done++;}));
  document.getElementById('workout-progress').textContent=`${done}/${total}`;
  document.getElementById('complete-bar-wrap').innerHTML=done>0&&done===total
    ?`<div class="complete-bar"><span>🎉 All sets done!</span><button class="btn-finish" onclick="finishWorkout()">Save workout</button></div>`:'';
}

function finishWorkout(){
  const type=state.currentWorkout; const w=WORKOUTS[type];
  const entry={
    date:new Date().toISOString(), type, label:w.label,
    exercises:w.exercises.map(ex=>({id:ex.id,name:ex.name,sets:(state.sets[ex.id]||[]).filter(s=>s.done).map(s=>({weight:s.weight,reps:s.reps}))})).filter(e=>e.sets.length>0),
    cardio:{type:state.cardio.type,duration:state.cardio.duration||null},
    abs:{selected:[...state.absSelected],intervals:{...state.absIntervals},sets:{...state.absSets}}
  };
  state.history.push(entry);
  const todayStr=todayKey(); const yd=new Date(); yd.setDate(yd.getDate()-1);
  if(state.lastWorkoutDate!==todayStr){
    state.streak=state.lastWorkoutDate===yd.toISOString().split('T')[0]?state.streak+1:1;
    state.lastWorkoutDate=todayStr;
  }
  saveState(); toastMsg('💪 Workout saved!'); goHome();
}

function goHome(){ state.currentWorkout=null; switchScreen('home'); renderHome(); }

// PROGRESS CHARTS
let progFilter=null; let chartInst=null;

function renderProgressScreen(){
  const exercises=allEx().filter(ex=>state.history.some(h=>h.exercises?.some(e=>e.id===ex.id&&e.sets.length)));
  if(!exercises.length){
    document.getElementById('prog-filter').innerHTML='';
    document.getElementById('prog-content').innerHTML='<div class="empty"><div class="icon">📈</div><p>No data yet.<br>Complete workouts to see progress.</p></div>'; return;
  }
  if(!progFilter||!exercises.find(e=>e.id===progFilter)) progFilter=exercises[0].id;
  buildFilterChips(exercises);
  renderChart(progFilter);
}

function buildFilterChips(exercises){
  document.getElementById('prog-filter').innerHTML=['push','pull','legs'].flatMap(t=>
    exercises.filter(e=>e._type===t).map(ex=>
      `<div class="fcchip ${progFilter===ex.id?'active':''}" onclick="setProgFilter('${ex.id}')">${ex.name}</div>`
    )
  ).join('');
}

function setProgFilter(id){
  progFilter=id;
  const exercises=allEx().filter(ex=>state.history.some(h=>h.exercises?.some(e=>e.id===ex.id&&e.sets.length)));
  buildFilterChips(exercises); renderChart(id);
}

function renderChart(exId){
  const ex=allEx().find(e=>e.id===exId); if(!ex) return;
  const pts=[];
  state.history.forEach(h=>{
    const found=h.exercises?.find(e=>e.id===exId);
    if(found&&found.sets.length){
      const maxW=Math.max(...found.sets.map(s=>s.weight));
      pts.push({x:new Date(h.date).toLocaleDateString('en-US',{month:'short',day:'numeric'}),y:maxW});
    }
  });
  const color=ex._type==='push'?'#FF5E3A':ex._type==='pull'?'#3A9EFF':'#A06EFF';
  document.getElementById('prog-content').innerHTML=`<div class="chart-section">
    <div class="chart-title">${ex.name}</div>
    <div class="chart-sub">${ex.sub} · Max weight per session (lb)</div>
    <div class="chart-wrap"><canvas id="mychart"></canvas></div>
    ${pts.length<2?'<div style="font-size:12px;color:var(--muted);text-align:center;margin-top:8px">Log more sessions to see your trend</div>':''}
  </div>`;
  if(chartInst){ chartInst.destroy(); chartInst=null; }
  const ctx=document.getElementById('mychart').getContext('2d');
  chartInst=new Chart(ctx,{
    type:'line',
    data:{
      labels:pts.map(p=>p.x),
      datasets:[{label:'Max (lb)',data:pts.map(p=>p.y),borderColor:color,backgroundColor:color+'22',borderWidth:2.5,pointBackgroundColor:color,pointRadius:5,pointHoverRadius:7,fill:true,tension:0.35}]
    },
    options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>`${ctx.parsed.y} lb`}}},
      scales:{
        x:{grid:{color:'rgba(255,255,255,0.04)'},ticks:{color:'#666',font:{size:11}}},
        y:{grid:{color:'rgba(255,255,255,0.04)'},ticks:{color:'#666',font:{size:11}}}
      }
    }
  });
}

// HISTORY
function renderHistory(){
  const c=document.getElementById('history-content');
  if(!state.history.length){ c.innerHTML='<div class="empty"><div class="icon">📋</div><p>No workouts yet.</p></div>'; return; }
  c.innerHTML=[...state.history].reverse().map(h=>{
    const d=new Date(h.date);
    const dateStr=d.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
    const timeStr=d.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});
    const pills=[];
    if(h.cardio?.type) pills.push(`<span class="pill cardio">${h.cardio.type}${h.cardio.duration?' · '+h.cardio.duration+'min':''}</span>`);
    (h.abs?.selected||[]).forEach(id=>{
      const a=ABS_OPTS.find(x=>x.id===id);
      if(a){
        const intv=h.abs.intervals?.[id]; const sets=h.abs.sets?.[id]||1;
        const sfx=[sets>1?`${sets} sets`:'', intv?`${intv}s`:''].filter(Boolean).join(' · ');
        pills.push(`<span class="pill abs">${a.name}${sfx?' · '+sfx:''}</span>`);
      }
    });
    return `<div class="history-card">
      <div class="history-date">${dateStr} at ${timeStr}</div>
      <div class="history-day ${h.type}">${h.label} DAY</div>
      <div>${h.exercises.map(e=>`<div class="history-ex-row"><span>${e.name}</span><span style="color:var(--muted)">${e.sets.length}×${e.sets[0]?.weight}lb</span></div>`).join('')}</div>
      ${pills.length?`<div class="pill-row">${pills.join('')}</div>`:''}
    </div>`;
  }).join('');
}

// RECORDS
let prFilter='all';
function renderPRs(){
  document.getElementById('pr-filter-row').innerHTML=[['all','All'],['push','Push'],['pull','Pull'],['legs','Legs']].map(([k,l])=>
    `<div class="chip ${prFilter===k?'active':''}" onclick="setPRFilter('${k}')">${l}</div>`
  ).join('');
  const entries=allEx().filter(ex=>(prFilter==='all'||ex._type===prFilter)&&state.prs[ex.id]);
  document.getElementById('pr-content').innerHTML=!entries.length
    ?'<div class="empty"><div class="icon">🏆</div><p>No PRs yet.</p></div>'
    :entries.map(ex=>{
      const pr=state.prs[ex.id];
      return `<div class="pr-card">
        <div class="pr-icon">🏆</div>
        <div style="flex:1"><div class="pr-name">${ex.name}</div><div class="pr-sub">${ex.sub} · ${new Date(pr.date).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}</div></div>
        <div style="text-align:right"><div class="pr-weight">${pr.weight}<span style="font-size:14px;color:var(--muted)">lb</span></div><div class="pr-reps">× ${pr.reps} reps</div></div>
      </div>`;
    }).join('');
}
function setPRFilter(f){ prFilter=f; renderPRs(); }

function allEx(){ return Object.entries(WORKOUTS).flatMap(([t,w])=>w.exercises.map(ex=>({...ex,_type:t}))); }

// NAV
function switchTab(tab){
  switchScreen(tab);
  if(tab==='home') renderHome();
  else if(tab==='progress') renderProgressScreen();
  else if(tab==='history') renderHistory();
  else if(tab==='prs') renderPRs();
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  const nb=document.getElementById('nav-'+tab); if(nb) nb.classList.add('active');
}

function switchScreen(name){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('screen-'+name).classList.add('active');
}

loadState(); renderHome();
</script>
